services:
  - type: web
    name: torneo-de-futbol
    env: static
    buildCommand: ""
    staticPublishPath: "./"
    
    # Redirecciones para ocultar archivos sensibles de OWASP ZAP
    routes:
      - type: rewrite
        source: /*.sql
        destination: /404.html
      - type: rewrite
        source: /*.md
        destination: /404.html
      - type: rewrite
        source: /*.json
        destination: /404.html
        
    # Cabeceras de seguridad estrictas exigidas por OWASP ZAP
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains; preload
      - path: /*
        name: Permissions-Policy
        value: geolocation=(), microphone=(), camera=()
